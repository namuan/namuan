<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My tldraw Whiteboard</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tldraw/tldraw@latest/dist/index.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tldraw/tldraw@latest/tldraw.css">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #f8f9fa;
    }
    #root {
      position: fixed;
      inset: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const { Tldraw } = window.tldraw;

    function App() {
      return React.createElement('div', {
        style: { position: 'fixed', inset: 0 }
      },
        React.createElement(Tldraw, {
          // Add options here if you want (e.g. readOnly: true)
        })
      );
    }

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
